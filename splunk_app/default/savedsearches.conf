#  MCPAgents Splunk Saved Searches & Alerts
#  Splunk CDTS (Cisco Deep Time Series) anomaly detection

# ── Cost Spike Alert ──────────────────────────────────────────────────────
[MCPAgents Cost Anomaly Alert]
search = index=mcp_agents event_type=mcp_llm_call \
  | timechart span=5m sum(cost_usd) as cost_5m \
  | predict cost_5m future_timespan=1 algorithm=LLP5 \
  | where cost_5m > upper95 \
  | eval anomaly_type="cost_spike", metric_value=tostring(cost_5m), model="" \
  | fields anomaly_type, metric_value, model
cron_schedule=*/5 * * * *
enableSched=1
alert.severity=high
alert.suppress=1
alert.suppress.period=10m
action.webhook=1
action.webhook.param.url=$MCPAGENTS_WEBHOOK_URL$/splunk/alert
description=Detects LLM cost spikes using Splunk CDTS prediction
dispatch.earliest_time=-1h

# ── Latency Spike Alert ───────────────────────────────────────────────────
[MCPAgents Latency Anomaly Alert]
search = index=mcp_agents event_type=mcp_llm_call \
  | timechart span=5m avg(latency_ms) as avg_latency \
  | predict avg_latency future_timespan=1 algorithm=LLP5 \
  | where avg_latency > upper95 OR avg_latency > 5000 \
  | eval anomaly_type="latency_spike", metric_value=tostring(avg_latency) \
  | fields anomaly_type, metric_value, model
cron_schedule=*/5 * * * *
enableSched=1
alert.severity=medium
action.webhook=1
action.webhook.param.url=$MCPAGENTS_WEBHOOK_URL$/splunk/alert

# ── Error Rate Alert ─────────────────────────────────────────────────────
[MCPAgents Error Rate Alert]
search = index=mcp_agents event_type=mcp_llm_call earliest=-10m \
  | stats count as total, \
          sum(eval(if(success="False",1,0))) as errors by model \
  | eval error_rate=round(errors/total,4) \
  | where error_rate > 0.15 \
  | eval anomaly_type="error_rate_high", metric_value=tostring(error_rate) \
  | fields anomaly_type, metric_value, model
cron_schedule=*/10 * * * *
enableSched=1
alert.severity=high
action.webhook=1
action.webhook.param.url=$MCPAGENTS_WEBHOOK_URL$/splunk/alert

# ── DLP Burst Alert ──────────────────────────────────────────────────────
[MCPAgents DLP Burst Alert]
search = index=mcp_agents event_type=mcp_dlp_violation earliest=-10m \
  | stats count as violations \
  | where violations >= 10 \
  | eval anomaly_type="dlp_burst", metric_value=tostring(violations) \
  | fields anomaly_type, metric_value
cron_schedule=*/10 * * * *
enableSched=1
alert.severity=critical
action.webhook=1
action.webhook.param.url=$MCPAGENTS_WEBHOOK_URL$/splunk/alert

# ── Dashboard: Hourly Cost Summary ───────────────────────────────────────
[MCPAgents Hourly Cost Summary]
search = index=mcp_agents event_type=mcp_llm_call \
  | timechart span=1h sum(cost_usd) as total_cost, \
              count as call_count \
              by model \
  | fillnull value=0
cron_schedule=0 * * * *
enableSched=0
dispatch.earliest_time=-24h

# ── Dashboard: DLP Violations by Rule ────────────────────────────────────
[MCPAgents DLP Violations by Rule]
search = index=mcp_agents event_type=mcp_dlp_violation \
  | stats count as violations, \
          values(action_taken) as actions \
    by rule_name, sensitivity \
  | sort -violations
enableSched=0
dispatch.earliest_time=-7d

# ── Dashboard: Model Performance ─────────────────────────────────────────
[MCPAgents Model Performance]
search = index=mcp_agents event_type=mcp_llm_call \
  | stats count as calls, \
          avg(latency_ms) as avg_latency, \
          avg(cost_usd) as avg_cost, \
          sum(eval(if(success="True",1,0))) as success_count \
    by model \
  | eval success_rate=round(success_count/calls*100,1) \
  | sort -calls
enableSched=0
dispatch.earliest_time=-24h

# ── Dashboard: Cache Savings ─────────────────────────────────────────────
[MCPAgents Cache Savings]
search = index=mcp_agents (event_type=mcp_cache_hit OR event_type=mcp_cache_miss) \
  | stats count(eval(event_type="mcp_cache_hit"))  as hits, \
          count(eval(event_type="mcp_cache_miss")) as misses, \
          sum(saved_cost) as total_saved_usd \
    by model \
  | eval hit_rate=round(hits/(hits+misses)*100,1)
enableSched=0
dispatch.earliest_time=-24h
